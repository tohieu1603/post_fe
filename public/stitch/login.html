<body class="bg-background min-h-screen flex flex-col items-center justify-center login-gradient antialiased">

</div>
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5" for="password">Mật khẩu</label>
<div class="relative">
<input class="w-full h-[44px] bg-surface-container-low border-outline-variant/30 rounded-lg px-4 pr-11 text-on-surface focus:ring-2 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between text-sm">
<label class="flex items-center cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all" type="checkbox"/>
<span class="ml-2 text-on-surface-variant group-hover:text-on-surface transition-colors">Ghi nhớ đăng nhập</span>
</label>
<a class="font-semibold text-primary hover:text-secondary transition-colors" href="/quen-mat-khau">Quên mật khẩu?</a>
</div>
<button class="w-full h-[44px] bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-lg hover:brightness-110 active:scale-[0.98] transition-all shadow-md shadow-primary/20" type="submit">
                    Đăng nhập
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-3 bg-surface-container-lowest text-outline/60 font-medium">hoặc</span>
</div>
</div>
<!-- Social Logins -->
