<!DOCTYPE html>

        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopNavBar: Suppressed on focused Transactional pages (Register) as per Shell Visibility Rule -->
<!-- However, since the user explicitly requested it, it will be rendered as a minimal version or standard as provided -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 max-w-7xl mx-auto left-0 right-0 bg-white/70 backdrop-blur-xl transition-all duration-200">
<div class="text-xl font-bold text-emerald-700 flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
            AI Vietnam
        </div>
<div class="hidden md:flex items-center gap-8">
<a class="text-slate-600 hover:text-emerald-500 transition-colors" href="#">Về chúng tôi</a>
<a class="text-slate-600 hover:text-emerald-500 transition-colors" href="#">Tính năng</a>
<a class="text-slate-600 hover:text-emerald-500 transition-colors" href="#">Tài liệu</a>
</div>
<div class="flex items-center gap-4">
<a class="text-emerald-700 font-semibold border-b-2 border-emerald-500 pb-1" href="/dang-ky">Đăng ký</a>
<a class="px-4 py-2 text-slate-600 hover:text-emerald-500 transition-colors" href="/dang-nhap">Đăng nhập</a>
</div>
</nav>
<!-- Main Content: Focused Registration Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 relative overflow-hidden bg-gradient-to-br from-emerald-50 via-white to-white">
<!-- Abstract background decoration -->
<div class="absolute top-0 right-0 w-96 h-96 bg-primary-container/10 blur-[120px] -z-10 rounded-full"></div>
<div class="absolute bottom-0 left-0 w-64 h-64 bg-secondary-container/10 blur-[100px] -z-10 rounded-full"></div>
<section class="w-full max-w-[420px] bg-white rounded-2xl shadow-xl p-10 flex flex-col items-center">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-8">
<div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-3xl" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="text-2xl font-bold text-on-surface mb-2 font-headline tracking-tight">Tạo tài khoản</h1>
<p class="text-slate-500 text-sm text-center">Đăng ký để trải nghiệm AI Vietnam</p>
</div>
<!-- Registration Form -->
<form class="w-full space-y-5">
<div class="space-y-1.5">
<label class="text-[11px] uppercase tracking-wider font-semibold text-slate-500 block">Họ và tên</label>
<input class="w-full px-4 h-12 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-on-surface" placeholder="Nguyễn Văn A" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-[11px] uppercase tracking-wider font-semibold text-slate-500 block">Email</label>
<input class="w-full px-4 h-12 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-on-surface" placeholder="you@example.com" type="email"/>
</div>
<div class="space-y-1.5 relative">
<label class="text-[11px] uppercase tracking-wider font-semibold text-slate-500 block">Mật khẩu</label>
<div class="relative">
<input class="w-full px-4 h-12 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-on-surface pr-12" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Password Strength Bar -->
<div class="flex gap-1 pt-1">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-surface-variant rounded-full"></div>
</div>
<p class="text-[10px] text-slate-400">Độ mạnh: <span class="text-emerald-600 font-medium">Trung bình</span></p>
</div>
<div class="space-y-1.5">
<label class="text-[11px] uppercase tracking-wider font-semibold text-slate-500 block">Xác nhận mật khẩu</label>
<input class="w-full px-4 h-12 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-on-surface" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-start gap-3 py-2">
<input class="mt-1 w-4 h-4 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500" id="terms" type="checkbox"/>
<label class="text-sm text-slate-500 leading-tight" for="terms">
                        Tôi đồng ý với <a class="text-emerald-600 font-medium hover:underline" href="#">Điều khoản sử dụng</a> và <a class="text-emerald-600 font-medium hover:underline" href="#">Chính sách bảo mật</a>
</label>
</div>
<button class="w-full h-[44px] bg-primary text-white rounded-xl font-semibold hover:bg-emerald-700 transition-all transform active:scale-95 flex items-center justify-center gap-2" type="submit">
                    Đăng ký
                </button>
</form>
<div class="w-full flex items-center gap-4 my-6">
<div class="h-px bg-slate-100 flex-grow"></div>
<span class="text-[11px] uppercase tracking-widest text-slate-400 font-medium">hoặc</span>
<div class="h-px bg-slate-100 flex-grow"></div>
</div>
<!-- OAuth Buttons -->
<div class="w-full space-y-3">
<button class="w-full h-[44px] border border-slate-200 rounded-xl flex items-center justify-center gap-3 text-slate-700 font-medium hover:bg-slate-50 transition-all active:scale-95 bg-white">
<img alt="" class="w-5 h-5" data-alt="Google logo icon with multi-colored letters on a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOtDFmIdbToI1HOwvBXyIPev4J4J6qAgDagZCCU0r25FysLzoT-vcvGt2_b37YbShtxaYTV8rXr1jCdBUGGBlos0h0povf7Y8kQh0heK4pVjxJsLBpq_mXEzdr91TSX3t6CoNIv4SCAyyGt-G9h8yHBxih3EEJ8gM24Lr9C9ysIzjjLFGMF2J_ta6f6d-5owxQcJCaMN1nuoXw3Qu3pQ-2fzW6QiZB9VqVbdT9l3VFz1fAxGZpv-aIa1B0U3qRfAj3Wz6AKKfgvQ"/>
                    Tiếp tục với Google
                </button>
<button class="w-full h-[44px] bg-[#1877F2] text-white rounded-xl flex items-center justify-center gap-3 font-medium hover:opacity-90 transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="facebook" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
                    Tiếp tục với Facebook
                </button>
</div>
<p class="mt-8 text-sm text-slate-500">
                Đã có tài khoản? 
                <a class="text-emerald-600 font-semibold hover:underline" href="/dang-nhap">Đăng nhập</a>
</p>
</section>
</main>
<!-- Footer -->
<footer class="w-full py-12 px-6 bg-slate-50 border-t border-slate-200">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
<div class="text-lg font-bold text-slate-900 flex items-center gap-2">
<span class="material-symbols-outlined text-emerald-600" data-icon="eco">eco</span>
                AI Vietnam
            </div>
<div class="flex gap-6">
<a class="text-sm text-slate-500 hover:text-emerald-500 transition-all" href="#">Điều khoản</a>
<a class="text-sm text-slate-500 hover:text-emerald-500 transition-all" href="#">Bảo mật</a>
<a class="text-sm text-slate-500 hover:text-emerald-500 transition-all" href="/lien-he">Liên hệ</a>
<a class="text-sm text-slate-500 hover:text-emerald-500 transition-all" href="#">Trợ giúp</a>
</div>
<div class="text-sm text-slate-500 font-['Inter']">
                © 2024 AI Vietnam. Nền tảng trí tuệ nhân tạo hàng đầu.
            </div>
</div>
</footer>
</body></html>
