<!DOCTYPE html>

<html class="light" lang="vi"><head><base target="_top"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .editorial-gradient {
            background: linear-gradient(to bottom, #f0fdf4, #ffffff);
        }
        .primary-gradient-btn {
            background: linear-gradient(135deg, #006c49 0%, #10b981 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#d9e6dd",
                        "on-primary-fixed-variant": "#005236",
                        "on-primary-container": "#00422b",
                        "on-background": "#131e19",
                        "surface-container": "#e4f1e8",
                        "primary": "#006c49",
                        "surface-container-high": "#deebe3",
                        "on-secondary-fixed": "#002114",
                        "inverse-on-surface": "#e7f4eb",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#00714e",
                        "on-secondary-fixed-variant": "#005137",
                        "secondary-fixed-dim": "#68dba9",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-tertiary-container": "#523200",
                        "surface-dim": "#d0ddd5",
                        "primary-fixed": "#6ffbbe",
                        "surface": "#f0fdf4",
                        "outline": "#6c7a71",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f0fdf4",
                        "outline-variant": "#bbcabf",
                        "on-surface": "#131e19",
                        "on-primary-fixed": "#002113",
                        "inverse-surface": "#27332d",
                        "secondary-fixed": "#85f8c4",
                        "surface-container-low": "#eaf7ee",
                        "surface-variant": "#d9e6dd",
                        "surface-tint": "#006c49",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#e29100",
                        "inverse-primary": "#4edea3",
                        "surface-bright": "#f0fdf4",
                        "on-tertiary-fixed": "#2a1700",
                        "primary-container": "#10b981",
                        "tertiary-fixed": "#ffddb8",
                        "tertiary": "#855300",
                        "tertiary-fixed-dim": "#ffb95f",
                        "secondary-container": "#82f5c1",
                        "on-surface-variant": "#3c4a42",
                        "secondary": "#006c4a",
                        "primary-fixed-dim": "#4edea3",
                        "on-tertiary": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-surface text-on-background min-h-screen flex flex-col editorial-gradient">
<!-- TopNavBar (Suppressed for focused transactional task as per rules, but identity is maintained in the card) -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-[420px] bg-surface-container-lowest rounded-2xl shadow-xl p-10 flex flex-col items-center">
<!-- Branding Section -->
<div class="flex items-center gap-2 mb-10 group cursor-default">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="eco">eco</span>
<span class="text-xl font-bold tracking-tighter text-primary">AI Vietnam</span>
</div>
<!-- Visual Anchor -->
<div class="w-20 h-20 bg-surface-container rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-outline-variant text-4xl" data-icon="lock_reset">lock_reset</span>
</div>
<!-- Messaging -->
<div class="text-center mb-8">
<h1 class="text-2xl font-bold text-on-background tracking-tight mb-2">Quên mật khẩu?</h1>
<p class="text-on-surface-variant leading-relaxed">Nhập email để nhận link đặt lại mật khẩu.</p>
</div>
<!-- Transactional Form -->
<form class="w-full space-y-6">
<div class="space-y-1.5">
<label class="text-sm font-semibold text-on-surface-variant ml-1" for="email">Địa chỉ Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full h-11 pl-10 pr-4 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all placeholder:text-outline-variant" id="email" placeholder="you@example.com" type="email"/>
</div>
</div>
<button class="w-full h-11 primary-gradient-btn text-on-primary font-bold rounded-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                    Gửi link đặt lại
                </button>
</form>
<!-- Navigation Fallback -->
<div class="mt-8">
<a class="flex items-center gap-2 text-primary font-semibold hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined text-lg" data-icon="arrow_back">arrow_back</span>
<span>Quay lại đăng nhập</span>
</a>
</div>
</div>
</main>
<!-- Footer - Simplified as per shell mandate for transactional pages -->
<footer class="w-full py-8 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto gap-4">
<p class="text-sm font-['Inter'] leading-relaxed text-on-surface-variant">© 2024 AI Vietnam. The Editorial Intelligence.</p>
<div class="flex gap-6">
<a class="text-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Điều khoản</a>
<a class="text-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Bảo mật</a>
<a class="text-sm text-on-surface-variant hover:text-primary transition-colors" href="/lien-he">Liên hệ</a>
</div>
</div>
</footer>
<!-- Background Decorative Element (Tonal Plateau) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-30">
<div class="absolute top-[10%] left-[5%] w-64 h-64 bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[15%] right-[5%] w-96 h-96 bg-tertiary-container/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
